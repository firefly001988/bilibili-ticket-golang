syntax = "proto3";

package worker;

option go_package = "bilibili-ticket-golang/cluster/worker/proto";

import "google/protobuf/timestamp.proto";

// =============================================================================
// Enums
// =============================================================================

enum AttemptState {
  ATTEMPT_QUEUED    = 0;
  ATTEMPT_WAITING   = 1;
  ATTEMPT_RUNNING   = 2;
  ATTEMPT_STOPPING  = 3;
  ATTEMPT_STOPPED   = 4;
  ATTEMPT_SUCCEEDED = 5;
  ATTEMPT_FAILED    = 6;
}

enum StartMode {
  START_IMMEDIATE = 0;
  START_SCHEDULED = 1;
}

enum FailureReason {
  FAILURE_NONE           = 0;
  FAILURE_DEADLINE       = 1;
  FAILURE_STOPPED        = 2;
  FAILURE_COOKIE_INVALID = 3;
  FAILURE_HTTP_412       = 4;
  FAILURE_CAPTCHA        = 5;
  FAILURE_ACCOUNT_RISK   = 6;
  FAILURE_WORKER_LOST    = 7;
  FAILURE_UNRECOVERABLE  = 8;
  FAILURE_INTERNAL       = 9;
}

enum TaskType {
  TASK_TYPE_TICKET = 0;
  TASK_TYPE_BWS    = 1;
}

// =============================================================================
// Shared types
// =============================================================================

message Buyer {
  string logical_id = 1;
  int64  buyer_id   = 2;
  string name       = 3;
  string tel        = 4;
  string id_card    = 5;
  int32  type       = 6;
}

message Credentials {
  map<string, string> cookies        = 1;
  repeated HTTPCookie cookie_jar     = 2;
  string              refresh_token  = 3;
  int64               version        = 4;
  bytes               device_profile = 5;
}

message HTTPCookie {
  string name      = 1;
  string value     = 2;
  string domain    = 3;
  string path      = 4;
  bool   secure    = 5;
  bool   http_only = 6;
  int64  expires   = 7;
}

message ExecutionSpec {
  string                    attempt_id     = 1;
  string                    intent_id      = 2;
  int64                     project_id     = 3;
  int64                     screen_id      = 4;
  int64                     sku_id         = 5;
  repeated Buyer            buyers         = 6;
  StartMode                 start_mode     = 7;
  google.protobuf.Timestamp start_at       = 8;
  google.protobuf.Timestamp deadline       = 9;
  int64                     interval_ms    = 10;
  int64                     start_delay_ms = 11;
  Credentials               credentials    = 12;
  TaskType                  task_type      = 13;

  // BWS (Bilibili World) reservation fields – only used when task_type == BWS
  int32  bws_activity_id    = 20;
  string bws_ticket_no      = 21;
  string bws_activity_title = 22;
  int64  bws_reserve_time   = 23;
  string bws_reserve_date   = 24;
}

message ExecutionResult {
  string                    attempt_id     = 1;
  string                    intent_id      = 2;
  string                    spec_hash      = 3;
  AttemptState              state          = 4;
  bool                      success        = 5;
  string                    order_id       = 6;
  FailureReason             reason         = 7;
  string                    message        = 8;
  bool                      retryable      = 9;
  Credentials               credentials    = 10;
  google.protobuf.Timestamp started_at     = 11;
  google.protobuf.Timestamp finished_at    = 12;
  string                    payment_url    = 13;
  int64                     payment_expire = 14;
  int64                     order_time     = 15;
}

message LogEntry {
  int64                     sequence  = 1;
  google.protobuf.Timestamp time      = 2;
  string                    stage     = 3;
  string                    message   = 4;
  int32                     code      = 5;
  bool                      retryable = 6;
}

// =============================================================================
// Status (snapshot of a task)
// =============================================================================

message TaskStatus {
  string                    attempt_id  = 1;
  string                    spec_hash   = 2;
  AttemptState              state       = 3;
  google.protobuf.Timestamp lease_until = 4;
  ExecutionResult           result      = 5;
}

// =============================================================================
// RPC request / response messages
// =============================================================================

message HealthRequest {
  // The employer's build version (git commit hash).  The worker always
  // returns its own version in HealthResponse; the employer side is
  // responsible for comparing them and rejecting the connection when
  // they differ.  An empty employer_version bypasses the check on both
  // sides (development builds and explicitly forced connections).
  string employer_version = 1;
}

message HealthResponse {
  string worker_id         = 1;
  string version           = 2;
  string plugin_version    = 3;
  string algorithm_version = 4;
  string captcha_plugin    = 5;
  bool   clock_calibration = 6;
  string active_attempt_id = 7;
  // protocol_version_ok is false when the employer_version from the
  // request differs from the worker's own version.  The employer uses
  // this to trigger the version-mismatch UI flow instead of having to
  // parse a gRPC error message.
  bool protocol_version_ok = 8;
  // Clock offsets measured by this worker (milliseconds).
  // Positive means local clock is behind the server.
  int64 bilibili_offset_ms = 9;
  int64 ntp_offset_ms      = 10;
}

message SubmitRequest {
  ExecutionSpec spec = 1;
}

message SubmitResponse {
  TaskStatus status = 1;
}

message StatusRequest {
  string attempt_id = 1;
}

message StatusResponse {
  TaskStatus status = 1;
}

message LogsRequest {
  string attempt_id = 1;
}

message LogsResponse {
  repeated LogEntry entries = 1;
}

message StopRequest {
  string attempt_id = 1;
}

message StopResponse {
  TaskStatus status = 1;
}

message AckRequest {
  string attempt_id = 1;
}

message AckResponse {}

// =============================================================================
// Heartbeat – bidirectional streaming for liveness detection
// =============================================================================

message HeartbeatMsg {
  string                    worker_id         = 1;
  string                    active_attempt_id = 2;
  int64                     sequence          = 3;
  google.protobuf.Timestamp time              = 4;
  ExecutionResult           completed_task    = 5;  // non-nil when a task just completed
}

// =============================================================================
// Global configuration – pushed by the employer to all workers
// =============================================================================

message GlobalConfig {
  // Global retry interval in milliseconds. When set (>0), overrides the
  // per-spec interval_ms in ExecutionSpec. Workers use this value for the
  // delay between consecutive purchase attempts.
  int64 retry_interval_ms = 1;
  // Global start delay in milliseconds. Workers subtract this from the
  // scheduled start time to account for clock drift and network latency.
  int64 start_delay_ms = 2;
}

message ConfigureRequest {
  GlobalConfig config = 1;
}

message ConfigureResponse {}

// =============================================================================
// Buyer management – worker-side Bilibili real‑name buyer CRUD
// =============================================================================

message ListBuyersRequest {
  Credentials credentials = 1;
}

message ListBuyersResponse {
  repeated Buyer buyers      = 1;
  Credentials    credentials = 2;
}

message CreateBuyerRequest {
  Credentials credentials = 1;
  Buyer       buyer       = 2;
}

message CreateBuyerResponse {
  Buyer       buyer       = 1;
  Credentials credentials = 2;
}

message GetBuyerSensitiveDataRequest {
  Credentials credentials = 1;
  int64       buyer_id    = 2;
}

message GetBuyerSensitiveDataResponse {
  Buyer buyer = 1;
}

message DeleteBuyerRequest {
  Credentials credentials = 1;
  int64       buyer_id    = 2;
}

message DeleteBuyerResponse {}

// =============================================================================
// BWS (Bilibili World) reservation – sync queries
// =============================================================================

message CheckBWSBindRequest {
  Credentials credentials = 1;
}

message CheckBWSBindResponse {
  bool  is_bind     = 1;
  Credentials credentials = 2;
}

message BWSReservationInfoRequest {
  Credentials credentials   = 1;
  string      reserve_dates = 2;  // comma-separated, e.g. "20260711,20260712"
  int32       reserve_type  = 3;  // 1=activities, 2=goods
}

// BWSActivity is a single activity returned by the BWS reservation info API.
message BWSActivity {
  int32  reserve_id         = 1;
  string act_title          = 2;
  int64  reserve_begin_time = 3;
  int64  act_begin_time     = 4;
  int32  state              = 5;
  string describe_info      = 6;
  string reserve_date       = 7;
  int32  online_state       = 8;  // BW2026: 0=available, 1=already reserved
}

// BWSTicketInfo holds the ticket mapping for a given date.
message BWSTicketInfo {
  string date        = 1;
  string ticket      = 2;
  string screen_name = 3;
  string sku_name    = 4;
}

message BWSReservationInfoResponse {
  repeated BWSActivity   activities    = 1;
  repeated BWSTicketInfo ticket_infos  = 2;
  map<int32, bool>    reserved_ids  = 3;
  Credentials         credentials   = 4;
}

// BindBWSTicket binds real-name identity to a BWS electronic ticket.
message BindBWSTicketRequest {
  Credentials credentials = 1;
  int32  bid         = 2;  // activity bid, e.g. 202501
  int32  id_type     = 3;  // 0=身份证 1=护照 2=港澳通行证 3=台湾通行证
  string personal_id = 4;
  string ticket_no   = 5;  // last 4 digits
  string user_name   = 6;
}

message BindBWSTicketResponse {
  int32       code        = 1;
  string      message     = 2;
  Credentials credentials = 3;
}

// =============================================================================
// WorkerService
// =============================================================================

service WorkerService {
  // Health returns the worker's health and metadata.
  rpc Health(HealthRequest) returns (HealthResponse);

  // Submit creates a new task or returns an existing one idempotently.
  // Returns ALREADY_EXISTS if attemptId exists with a different spec.
  // Returns RESOURCE_EXHAUSTED if the worker is already busy.
  rpc Submit(SubmitRequest) returns (SubmitResponse);

  // Status returns the current status of a task, renewing its lease.
  // Returns NOT_FOUND if the attempt is unknown.
  rpc Status(StatusRequest) returns (StatusResponse);

  // Logs returns all log entries for a task.
  // Returns NOT_FOUND if the attempt is unknown.
  rpc Logs(LogsRequest) returns (LogsResponse);

  // Stop requests cancellation of a running task.
  // Returns NOT_FOUND if the attempt is unknown.
  rpc Stop(StopRequest) returns (StopResponse);

  // Ack acknowledges a terminal task, allowing the worker to clean up.
  // Returns NOT_FOUND if the attempt is unknown.
  // Returns FAILED_PRECONDITION if the attempt is not terminal.
  rpc Ack(AckRequest) returns (AckResponse);

  // Heartbeat is a bidirectional stream for liveness detection.
  // The worker periodically sends HeartbeatMsg; the master echoes them
  // back. Either side treats silence longer than the heartbeat interval
  // as a dead connection, triggering a reconnect.
  rpc Heartbeat(stream HeartbeatMsg) returns (stream HeartbeatMsg);

  // Configure pushes global settings (retry interval, start delay) from
  // the employer to the worker. The worker applies these immediately to
  // all future tasks. The employer calls this after a successful Health
  // handshake and whenever the user changes settings.
  rpc Configure(ConfigureRequest) returns (ConfigureResponse);

  // ListBuyers fetches the full (unmasked) real‑name buyer list from a
  // Bilibili account.  The worker uses the supplied credentials to log
  // into the Bilibili API and returns the refreshed credentials so the
  // employer can persist the updated cookie/version state.
  rpc ListBuyers(ListBuyersRequest) returns (ListBuyersResponse);

  // CreateBuyer provisions a new real‑name buyer on a Bilibili account
  // and returns the created buyer (with its assigned Bilibili buyer_id)
  // together with refreshed credentials.
  rpc CreateBuyer(CreateBuyerRequest) returns (CreateBuyerResponse);

  // GetBuyerSensitiveData fetches the full unmasked real‑name
  // information (ID card number, phone, etc.) for a specific buyer
  // already on a Bilibili account's real‑name list.
  rpc GetBuyerSensitiveData(GetBuyerSensitiveDataRequest) returns (GetBuyerSensitiveDataResponse);

  // ListBuyersMasked fetches the buyer list without unmasking sensitive
  // data.  ID cards and phone numbers may be returned with asterisks
  // (masked).  Use this to quickly enumerate buyers from many accounts
  // without rate-limiting, then call GetBuyerSensitiveData only for
  // unique logical buyers that need full real‑name information.
  rpc ListBuyersMasked(ListBuyersRequest) returns (ListBuyersResponse);

  // DeleteBuyer removes a real‑name buyer from a Bilibili account.
  rpc DeleteBuyer(DeleteBuyerRequest) returns (DeleteBuyerResponse);

  // ── BWS (Bilibili World) reservation ─────────────────

  // CheckBWSBind checks whether the account has a BWS electronic ticket
  // bound to a real‑name identity.
  rpc CheckBWSBind(CheckBWSBindRequest) returns (CheckBWSBindResponse);

  // GetBWSReservationInfo fetches all BWS activity information for the
  // given dates.
  rpc GetBWSReservationInfo(BWSReservationInfoRequest) returns (BWSReservationInfoResponse);

  // BindBWSTicket binds a real‑name identity to an electronic ticket.
  rpc BindBWSTicket(BindBWSTicketRequest) returns (BindBWSTicketResponse);
}
