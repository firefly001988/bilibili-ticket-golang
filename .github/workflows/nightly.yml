name: nightly

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'feat/employer-worker-cluster'
        type: string

permissions:
  contents: write

concurrency:
  group: nightly-${{ github.event.inputs.branch || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version: 1.25
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cmd/gui/frontend/package-lock.json
      - name: make frontend path
        run: mkdir -p cmd/gui/frontend
      - name: Test Go packages with race detector
        run: |
          go -C cluster test -race ./...
          go -C cmd/gui test -race ./...
          go -C cmd/ticket-worker test -race ./...
          go -C lib test -race ./...

  build:
    needs: verify
    strategy:
      fail-fast: true
      matrix:
        arch: [amd64, arm64]
        platform: [windows, linux]
        include:
          - platform: windows
            arch: amd64
            os: windows-latest
            ext: .exe
            cgo: 0
          - platform: windows
            arch: arm64
            os: windows-11-arm
            ext: .exe
            cgo: 0
          - platform: linux
            arch: amd64
            os: ubuntu-24.04
            ext: ""
            cgo: 1
          - platform: linux
            arch: arm64
            os: ubuntu-24.04-arm
            ext: ""
            cgo: 1
          - platform: darwin
            arch: arm64
            os: macos-26
            ext: ""
            cgo: 1
          - platform: darwin
            arch: amd64
            os: macos-26-intel
            ext: ""
            cgo: 1
    runs-on: ${{ matrix.os }}
    outputs:
      commit_short: ${{ steps.set_commit.outputs.short }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Set commit hash
        id: set_commit
        shell: bash
        run: |
          SHORT="${GITHUB_SHA:0:7}"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cmd/gui/frontend/package-lock.json

      - name: Cache apt packages
        if: matrix.platform == 'linux'
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ matrix.os }}-apt-${{ hashFiles('.github/workflows/nightly.yml') }}
          restore-keys: |
            ${{ matrix.os }}-apt-

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Skip anti-scalper prompt (CI only)
        run: |
          mkdir -p data
          echo "1" > data/.verified

      - name: Build app with Wails
        shell: bash
        working-directory: cmd/gui
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          COMMIT="${{ steps.set_commit.outputs.short }}"
          BUILD_TAGS="${{ matrix.platform == 'linux' && 'webkit2_41' || '' }}"
          BUILD_TIME=$(date -u +%Y%m%dT%H%M%S)
          if [ -n "$BUILD_TAGS" ]; then
            wails build -clean -nopackage -tags "$BUILD_TAGS" -ldflags "-X bilibili-ticket-golang/global.GitCommit=${COMMIT} -X bilibili-ticket-golang/global.BuildTime=${BUILD_TIME}"
          else
            wails build -clean -nopackage -ldflags "-X bilibili-ticket-golang/global.GitCommit=${COMMIT} -X bilibili-ticket-golang/global.BuildTime=${BUILD_TIME}"
          fi

      - name: Build ticket worker
        shell: bash
        env:
          CGO_ENABLED: 0
        run: go build -trimpath -o "build/bin/ticket-worker${{ matrix.ext }}" ./cmd/ticket-worker

      - name: Package artifacts
        shell: bash
        run: |
          COMMIT="${{ steps.set_commit.outputs.short }}"
          mkdir -p release
          BIN_NAME="bilibili-ticket-golang"
          SOURCE_FILE="build/bin/${BIN_NAME}${{ matrix.ext }}"
          WORKER_NAME="ticket-worker"
          WORKER_SOURCE="build/bin/${WORKER_NAME}${{ matrix.ext }}"

          # Package employer (GUI) separately
          GUI_SOURCE="cmd/gui/${SOURCE_FILE}"
          cp "$GUI_SOURCE" "release/${BIN_NAME}${{ matrix.ext }}"
          EMPLOYER_TGZ="release/${BIN_NAME}_${{ matrix.platform }}_${{ matrix.arch }}_${COMMIT}.tar.gz"
          tar -C release -czf "$EMPLOYER_TGZ" "${BIN_NAME}${{ matrix.ext }}"
          rm -f "release/${BIN_NAME}${{ matrix.ext }}"

          # Package worker (ticket-worker) separately
          cp "$WORKER_SOURCE" "release/${WORKER_NAME}${{ matrix.ext }}"
          WORKER_TGZ="release/${WORKER_NAME}_${{ matrix.platform }}_${{ matrix.arch }}_${COMMIT}.tar.gz"
          tar -C release -czf "$WORKER_TGZ" "${WORKER_NAME}${{ matrix.ext }}"
          rm -f "release/${WORKER_NAME}${{ matrix.ext }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/*.tar.gz
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Set commit hash
        id: set_commit
        shell: bash
        run: |
          SHORT="${GITHUB_SHA:0:7}"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifact tree
        run: |
          find release-assets -type f -name '*.tar.gz' -exec cp {} release-assets/ \;

      - name: Generate checksums
        run: |
          COMMIT="${{ steps.set_commit.outputs.short }}"
          cd release-assets
          sha256sum *.tar.gz > "checksums_${COMMIT}.txt"

      - name: Patch release.md
        shell: bash
        run: |
          sed "s|VERSION|${{ steps.set_commit.outputs.short }}|g" .github/release_template.md > release.md

      - name: Generate release.md
        shell: bash
        run: |
          COMMIT="${{ steps.set_commit.outputs.short }}"

          # 获取上一个 release 的 tag
          preTag=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | \
            sed -nE 's/.*"tag_name": "([^\"]+)".*/\1/p')

          if [ -n "$preTag" ] && git rev-parse "$preTag" >/dev/null 2>&1; then
            echo "上一版本: $preTag → 当前: $COMMIT"
            git log --no-merges --pretty=format:"- %s" "$preTag..HEAD" >> release.md
          else
            echo "首个发布版本" >> release.md
            git log --no-merges --pretty=format:"- %s" >> release.md
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          tag_name: "${{ steps.set_commit.outputs.short }}"
          name: "Build ${{ steps.set_commit.outputs.short }}"
          body_path: "./release.md"
          draft: false
          prerelease: false
          files: |
            release-assets/*.tar.gz
            release-assets/checksums_*.txt

      - name: Cleanup old releases (keep latest 10)
        shell: bash
        run: |
          RELEASES=$(gh release list --repo "${{ github.repository }}" --limit 100 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[].tagName')
          COUNT=0
          for TAG in $RELEASES; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 10 ]; then
              echo "Deleting old release: $TAG"
              gh release delete "$TAG" --repo "${{ github.repository }}" --yes --cleanup-tag
            fi
          done
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Notify Telegram
        shell: bash
        run: |
          COMMIT="${{ steps.set_commit.outputs.short }}"
          REPO="${{ github.repository }}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${COMMIT}"
          BOT="https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"

          # Get commit message: use push event message, fallback to latest git log
          if [ -n "${{ github.event.head_commit.message }}" ]; then
            COMMIT_MSG="${{ github.event.head_commit.message }}"
          else
            COMMIT_MSG=$(git log -1 --pretty=%B)
          fi
          # Escape Markdown special characters in commit message
          COMMIT_MSG=$(echo "$COMMIT_MSG" | head -1 | sed 's/[_*[\]()~`>#+\-=|{}.!]/\\&/g')

          MSG_HEAD="🚀 *New Nightly Build*"
          REPO_LINE="📦 *Repo:* \`${REPO}\`"
          BRANCH_LINE="🌿 *Branch:* \`${{ github.event.inputs.branch || github.ref }}\`"
          TAG_LINE="🔖 *Tag:* \`${COMMIT}\`"
          MSG_LINE="📝 ${COMMIT_MSG}"
          LINK_LINE="🔗 [View Release](${RELEASE_URL})"

          TEXT="${MSG_HEAD}%0A%0A${REPO_LINE}%0A${BRANCH_LINE}%0A${TAG_LINE}%0A${MSG_LINE}%0A${LINK_LINE}"

          curl -s -X POST "${BOT}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true"

          # Upload each file to Telegram
          for FILE in release-assets/*.tar.gz; do
            curl -s -X POST "${BOT}/sendDocument" \
              -F "chat_id=${CHAT_ID}" \
              -F "document=@${FILE}"
          done
